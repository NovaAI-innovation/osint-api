auth_enabled: false

server:
  http_listen_port: 3100

limits_config:
  # Allow running Loki with the v11 / boltdb-shipper schema even when the
  # binary is a newer Loki 3.x build (which normally forces v13 + tsdb).
  # Long-term fix: update the schema_config to use schema v13 and tsdb index.
  allow_structured_metadata: false

common:
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2020-10-24
      store: boltdb-shipper
      object_store: filesystem
      schema: v11
      index:
        prefix: index_
        period: 24h

ruler:
  storage:
    type: local
    local:
      directory: /loki/rules
