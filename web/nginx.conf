server {
    listen       8080;
    listen       [::]:8080;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Static UI: serve the single-page app.
    location = / {
        try_files /index.html =404;
    }

    location /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    # Static assets (if any are added later).
    location ~* \.(css|js|png|jpg|jpeg|gif|svg|ico)$ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }

    # Anything else (e.g. /api/...) -> 404 from nginx. The browser
    # talks to the gateway directly at http://localhost:8000.
    location / {
        return 404 '{"detail":"not found"}';
        add_header Content-Type application/json;
    }

    # Don't cache index.html so deploys land immediately.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
}
